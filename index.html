const fmtC = (n, compact = false) => {
  if (n === undefined || isNaN(n)) return "$0";
  const abs = Math.abs(n);
  if (compact && abs >= 1_000_000) return `$${(n / 1e6).toFixed(2)}M`;
  if (compact && abs >= 1_000) return `$${(n / 1e3).toFixed(0)}k`;
  return n.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
};

// ─── PENSION-AWARE MONTE CARLO ───────────────────────────────────────────────
// Each year uses the ACTUAL withdrawal after all income sources are applied.
// Pre-trsAge: high gap. At trsAge: TRS cuts withdrawal sharply.
// At ssAge: SS adds on, gap often drops to near-zero. Portfolio then compounds.
function monteCarloStepped({
  port, retireAge, trsAge, ssAge, years, sims = 1200,
  annualSpend, wifeIncome, dividends, sideIncome, condoCF, trs, ssIncome,
}) {
  if (port <= 0) return 0;
  const mu = 0.069, sigma = 0.155;
  let ok = 0;
  for (let sim = 0; sim < sims; sim++) {
    let b = port, alive = true;
    for (let y = 0; y < years; y++) {
      const age = retireAge + y;
      const inf = Math.pow(1.03, y);
      const guaranteed =
        wifeIncome * inf +
        dividends  * inf +
        sideIncome * inf +
        condoCF    * inf +
        (age >= trsAge ? trs      * inf : 0) +
        (age >= ssAge  ? ssIncome * inf : 0);
      const withdrawal = Math.max(0, annualSpend * inf - guaranteed);
      const u1 = Math.random(), u2 = Math.random();
      const z = Math.sqrt(-2 * Math.log(Math.max(u1, 1e-10))) * Math.cos(2 * Math.PI * u2);
      b = b * (1 + mu + sigma * z) - withdrawal;
      if (b <= 0) { alive = false; break; }
    }
    if (alive) ok++;
  }
  return ok / sims;
}

// ─── TRS PENSION ──────────────────────────────────────────────────────────────
function calcTRS(years, highFiveSalary = 195000) {
  return Math.round(0.023 * years * highFiveSalary);
}

// ─── PORTFOLIO GROWTH ─────────────────────────────────────────────────────────
function growPortfolio(current, monthlyContrib, months, annualReturn = 0.069) {
  const r = annualReturn / 12;
  let bal = current;
  for (let m = 0; m < months; m++) bal = bal * (1 + r) + monthlyContrib;
  return Math.round(bal);
}

// ─── SCENARIO ENGINE ──────────────────────────────────────────────────────────
function calcScenario(params) {
  const {
    currentPort, monthlyContrib, currentAge, retireAge,
    annualSpend, wifeIncome, dividends, trsYears, ssIncome,
    trsAge, ssAge, condoCashFlow, sideIncome,
  } = params;

  const months = Math.round((retireAge - currentAge) * 12);
  const projPort = growPortfolio(currentPort, monthlyContrib, months);
  const trs = calcTRS(trsYears);

  // Pre-65 income
  const guaranteedPre = wifeIncome + dividends + sideIncome + condoCashFlow;
  const preGap = Math.max(0, annualSpend - guaranteedPre);
  const preWR = projPort > 0 ? preGap / projPort : 0;

  // Age 65+ income
  const guaranteed65 = dividends + trs + ssIncome;
  const postGap = Math.max(0, annualSpend - guaranteed65);

  // Monte Carlo
  const mcArgs = {
    port: projPort, retireAge, trsAge, ssAge,
    annualSpend, wifeIncome, dividends, sideIncome,
    condoCF: condoCashFlow, trs, ssIncome,
  };
  const mc20 = monteCarloStepped({ ...mcArgs, years: 20 });
  const mc30 = monteCarloStepped({ ...mcArgs, years: 30 });
  const mc40 = monteCarloStepped({ ...mcArgs, years: 40 });

  return { projPort, trs, guaranteedPre, preGap, preWR, guaranteed65, postGap, mc20, mc30, mc40 };
}

  const [s, setS] = useState(DEF);
  const [budgetVals, setBudgetVals] = useState(
    () => Object.fromEntries(ALL_ITEMS.map(i => [i.id, i.monthly]))
  );
  const [budgetOpen, setBudgetOpen] = useState({});
  const set = k => v => setS(p => ({ ...p, [k]: v }));

  // ── Current scenario ──
  const curScenario = RETIRE_SCENARIOS.find(sc => sc.id === s.selectedScenario) || RETIRE_SCENARIOS[1];

  // ── Budget total in TODAY's dollars (2026) ──
  const budgetMonthly = useMemo(() =>
    ALL_ITEMS.reduce((sum, i) => sum + (budgetVals[i.id] ?? i.monthly), 0), [budgetVals]);
  const budgetAnnual = budgetMonthly * 12; // today's dollars — used for display in budget tab

  // ── Years to retirement & inflation factor ──
  const yearsToRetire = Math.max(0, curScenario.retireAge - s.currentAge);
  const inflFactor = Math.pow(1 + s.inflation, yearsToRetire);

  // ── Budget in RETIREMENT-YEAR dollars (inflated forward) ──
  // This is what things will actually cost when you stop working.
  // Switching from Jun 2026 → Jun 2030 auto-inflates every budget line.
  const budgetAtRetire = Math.round(budgetAnnual * inflFactor);

  // ── EFFECTIVE SPEND: what the FIRE engine actually uses ──
  // budgetDrives=true → use the inflation-adjusted budget total
  // budgetDrives=false → use the manual slider (also in retirement-year dollars)
  const effectiveSpend = s.budgetDrives ? budgetAtRetire : s.annualSpend;

  // ── Core calcs — wife income driven by mode selector ──
  const wifeInc = useMemo(() => {
    if (s.wifeMode === "full")      return s.wifeIncome;
    if (s.wifeMode === "ssdi_gone") return Math.round(s.wifeIncome * 0.45); // OPERS pension only ~$24k
    if (s.wifeMode === "all_gone")  return 0;
    if (s.wifeMode === "custom")    return s.customWifeIncome;
    return s.wifeIncome;
  }, [s.wifeMode, s.wifeIncome, s.customWifeIncome]);

  const sideInc = s.sideIncomeOn ? s.sideIncome : 0;
  const divs    = s.dividendsOn ? s.dividends : 0;

  const condoCF = s.condoOn
    ? (s.condoRentalOn ? s.condoRental - s.condoMonthlyCarry * 12 : -s.condoMonthlyCarry * 12)
    : 0;

  const derived = useMemo(() => calcScenario({
    currentPort: s.currentPort,
    monthlyContrib: s.monthlyContrib,
    currentAge: s.currentAge,
    retireAge: curScenario.retireAge,
    annualSpend: effectiveSpend,
    wifeIncome: wifeInc,
    dividends: divs,
    trsYears: curScenario.trsYears,
    ssIncome: s.ssIncome,
    trsAge: s.trsAge,
    ssAge: s.ssAge,
    condoCashFlow: condoCF,
    sideIncome: sideInc,
  }), [s, curScenario, wifeInc, divs, condoCF]);

  // ── All 5 scenarios for comparison ──
  const allScenarios = useMemo(() =>
    RETIRE_SCENARIOS.map(sc => ({
      ...sc,
      ...calcScenario({
        currentPort: s.currentPort,
        monthlyContrib: s.monthlyContrib,
        currentAge: s.currentAge,
        retireAge: sc.retireAge,
        annualSpend: effectiveSpend,
        wifeIncome: wifeInc,
        dividends: divs,
        trsYears: sc.trsYears,
        ssIncome: s.ssIncome,
        trsAge: s.trsAge,

            {BUDGET_CATS.map(cat => {
              const p = budgetMonthly > 0 ? (catTotals[cat.id] / budgetMonthly) * 100 : 0;
              return <div key={cat.id} style={{ width: `${p}%`, background: cat.color, transition: "width 0.4s" }} />;
            })}
          </div>
          <div style={{ marginTop: 8, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
            <div style={{ background: "rgba(0,0,0,0.2)", borderRadius: 8, padding: "7px 10px" }}>
              <div style={{ fontSize: 9, color: C.dim, textTransform: "uppercase", letterSpacing: 0.5 }}>Today (2026)</div>
              <div style={{ fontSize: 14, fontWeight: 800, fontFamily: "monospace", color: C.muted }}>{fmtC(budgetAnnual, true)}/yr</div>
              <div style={{ fontSize: 9, color: C.dim }}>{fmtC(budgetMonthly)}/mo</div>
            </div>
            <div style={{ background: `${C.gold}15`, borderRadius: 8, padding: "7px 10px", border: `1px solid ${C.gold}30` }}>
              <div style={{ fontSize: 9, color: C.gold, textTransform: "uppercase", letterSpacing: 0.5 }}>At {curScenario.label}</div>
              <div style={{ fontSize: 14, fontWeight: 800, fontFamily: "monospace", color: C.gold }}>{fmtC(budgetAtRetire, true)}/yr</div>
              <div style={{ fontSize: 9, color: C.dim }}>+{((inflFactor-1)*100).toFixed(1)}% inflation over {yearsToRetire}yr</div>
            </div>
          </div>
          {s.budgetDrives && (
            <div style={{ marginTop: 8, fontSize: 10, color: C.teal, padding: "5px 8px", borderRadius: 6, background: `${C.teal}12`, border: `1px solid ${C.teal}25` }}>
              ✓ FIRE engine uses <strong>{fmtC(budgetAtRetire, true)}/yr</strong> — budget inflated to {curScenario.label}. Change the scenario and this updates instantly.
            </div>
          )}
        </div>

        {/* Category cards */}
        {BUDGET_CATS.map(cat => {
          const isOpen = !!budgetOpen[cat.id];
          const catTotal = catTotals[cat.id];
          return (
            <div key={cat.id} style={{
              background: C.card, border: `1px solid ${C.border}`,
              borderRadius: 12, marginBottom: 9, overflow: "hidden",
            }}>
              <div onClick={() => setBudgetOpen(o => ({ ...o, [cat.id]: !isOpen }))}
                style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                  padding: "12px 14px", cursor: "pointer",
                  borderLeft: `3px solid ${cat.color}` }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 18 }}>{cat.icon}</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{cat.label}</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "monospace", color: cat.color }}>
                    {fmtC(catTotal * 12, true)}/yr
                  </span>
                  <span style={{ color: C.dim, fontSize: 11 }}>{isOpen ? "▲" : "▼"}</span>
                </div>
              </div>
              {isOpen && (
                <div style={{ padding: "4px 14px 12px", borderTop: `1px solid ${C.border}` }}>
                  {cat.items.map((item, idx) => {
                    const v = budgetVals[item.id] ?? item.monthly;
                    return (
                      <div key={item.id} style={{ marginTop: 10, paddingTop: idx > 0 ? 10 : 0,
                        borderTop: idx > 0 ? `1px solid ${C.border}30` : "none" }}>
                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                          <span style={{ fontSize: 11, color: C.text }}>{item.label}</span>
                          <span style={{ fontSize: 12, fontWeight: 700, fontFamily: "monospace", color: C.accent }}>
                            {fmtC(v)}/mo
                          </span>
                        </div>
                        <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 4 }}>
                          <span style={{ fontSize: 9, color: C.dim }}>{fmtC(item.min, true)}</span>
                          <input type="range" min={item.min} max={item.max} step={5} value={v}
                            onChange={e => setBudgetVals(prev => ({ ...prev, [item.id]: Number(e.target.value) }))}
                            style={{ flex: 1, accentColor: cat.color, cursor: "pointer" }} />
                          <span style={{ fontSize: 9, color: C.dim }}>{fmtC(item.max, true)}</span>
                        </div>
                      </div>
                    );
                  })}
                  <div style={{ marginTop: 10, paddingTop: 8, borderTop: `1px solid ${cat.color}40`,
                    display: "flex", justifyContent: "space-between", fontSize: 11 }}>
                    <span style={{ color: cat.color }}>Category total</span>
                    <span style={{ fontFamily: "monospace", fontWeight: 700, color: cat.color }}>
                      {fmtC(catTotal)}/mo · {fmtC(catTotal * 12, true)}/yr
                    </span>
                  </div>
                </div>
              )}
            </div>
          );
        })}

        <div style={{ padding: "10px 12px", borderRadius: 10, background: `${C.pink}12`, border: `1px solid ${C.pink}30`,
          fontSize: 11, color: C.muted, lineHeight: 1.7, marginTop: 4 }}>
          ⚕️ <strong style={{ color: C.pink }}>ACA is your biggest lever pre-65.</strong> Full-price couple ≈ $1,800/mo in 2026.
          Managing MAGI below 400% FPL (~$79k/couple) can save $500–1,000/mo. SSDI income counts toward MAGI.
        </div>
      </div>
    );
  };

  // ─── TAB: OZARKS ──────────────────────────────────────────────────────────
  const OzarksTab = () => {
    const netCF = s.condoRentalOn ? s.condoRental - s.condoMonthlyCarry * 12 : -s.condoMonthlyCarry * 12;
    const portfolioHit = s.condoDown;
    const portAfterDown = derived.projPort - portfolioHit;
    const wrWithCondo = portAfterDown > 0 ? Math.max(0, effectiveSpend - wifeInc - divs - s.sideIncome - netCF) / portAfterDown : 0;

    return (
      <div>
        <Card style={{ background: `${C.lake}15`, border: `1px solid ${C.lake}40` }}>
          <SectionLabel color={C.accent}>Lake of the Ozarks Scenario</SectionLabel>
          <Toggle label="Model Ozarks Condo" value={s.condoOn} onChange={set("condoOn")} color={C.accent} />
        </Card>

        {s.condoOn && (
          <>
            <Card>
              <SectionLabel>Condo Financials</SectionLabel>
              <Slider label="Purchase Price" value={s.condoCost} min={150000} max={600000} step={5000} onChange={set("condoCost")} />
              <Slider label="Down Payment" value={s.condoDown} min={20000} max={s.condoCost * 0.5} step={5000} onChange={set("condoDown")} />
              <Slider label="Monthly Carry Cost" value={s.condoMonthlyCarry} min={500} max={4000} step={50} onChange={set("condoMonthlyCarry")}
                note="Mortgage, HOA, insurance, taxes, utilities" />
              <Toggle label="Rental Income Enabled" value={s.condoRentalOn} onChange={set("condoRentalOn")} color={C.green} />
              {s.condoRentalOn && (
                <Slider label="Annual Rental Income" value={s.condoRental} min={5000} max={50000} step={500} onChange={set("condoRental")} />
              )}
            </Card>

            <Card>
              <SectionLabel color={C.gold}>Condo P&L</SectionLabel>
              {[
                { label: "Annual Carry Cost", val: -s.condoMonthlyCarry * 12, color: C.red },
                ...(s.condoRentalOn ? [{ label: "Rental Income", val: s.condoRental, color: C.green }] : []),
                { label: "Net Annual Cash Flow", val: netCF, color: netCF >= 0 ? C.greenBright : C.orange },
              ].map(({ label, val, color }) => (
                <div key={label} style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontSize: 12, color: C.muted }}>{label}</span>
                  <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "monospace", color }}>
                    {val >= 0 ? "" : "-"}{fmtC(Math.abs(val), true)}/yr
                  </span>
                </div>
              ))}
              <div style={{ marginTop: 10, padding: "8px 10px", borderRadius: 8,
                background: `${C.orange}12`, border: `1px solid ${C.orange}30`, fontSize: 11, color: C.muted, lineHeight: 1.7 }}>
                Down payment of {fmtC(s.condoDown, true)} reduces portfolio at retirement.
                Net annual cost {netCF < 0 ? `increases spending gap by ${fmtC(-netCF, true)}/yr` : `reduces gap by ${fmtC(netCF, true)}/yr`}.
                WR with condo: <strong style={{ color: wrWithCondo < 0.05 ? C.green : C.orange }}>{fmtPct(wrWithCondo)}</strong>
              </div>
            </Card>
          </>
        )}

        {!s.condoOn && (
          <div style={{ padding: "24px 16px", textAlign: "center", color: C.muted, fontSize: 13 }}>
            Toggle above to model the Lake of the Ozarks condo scenario
          </div>
        )}
      </div>
    );
  };

  // ─── TAB: LEGACY ──────────────────────────────────────────────────────────
  const LegacyTab = () => {
    // Simple 30-yr growth projection at 65
    const portAt65 = growPortfolio(derived.projPort, 0, (s.trsAge - curScenario.retireAge) * 12, 0.069);
    const portAt75 = growPortfolio(portAt65, 0, 10 * 12, 0.04); // slower draw phase
    const portAt85 = growPortfolio(portAt75, 0, 10 * 12, 0.04);

    return (
      <div>
        <Card style={{ background: `${C.gold}10`, border: `1px solid ${C.gold}30` }}>
          <SectionLabel color={C.gold}>Legacy Projection for Libby</SectionLabel>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 12, lineHeight: 1.7 }}>
            At 65, guaranteed income covers spending — your portfolio stops being a drawdown vehicle
            and becomes a growth asset. Here's what it could look like at modest real returns.
          </div>
          {[
            { label: `Age ${s.trsAge} (pension starts)`, val: portAt65, color: C.accent },
            { label: `Age ${s.trsAge + 10}`, val: portAt75, color: C.gold },
            { label: `Age ${s.trsAge + 20}`, val: portAt85, color: C.teal },
          ].map(({ label, val, color }) => (
            <div key={label} style={{ display: "flex", justifyContent: "space-between",
              alignItems: "center", marginBottom: 10, padding: "8px 10px",
              background: `${color}12`, borderRadius: 8, border: `1px solid ${color}30` }}>
              <span style={{ fontSize: 12, color: C.muted }}>{label}</span>
              <span style={{ fontSize: 18, fontWeight: 900, fontFamily: "monospace", color }}>{fmtC(val, true)}</span>
            </div>
          ))}
          <div style={{ fontSize: 10, color: C.dim, marginTop: 4 }}>
            Assumes 6.9% real return pre-65, 4% post-65 (conservative draw phase). No portfolio withdrawals after pension starts in this scenario.
          </div>
        </Card>

        <Card>
          <SectionLabel color={C.teal}>Estate & Family Notes</SectionLabel>
          {[
            "🏠 Edmond home — paid off, fully owned legacy asset",
            "📈 Portfolio shifts to legacy vehicle when TRS + SS + dividends cover spending",
            "👧 Libby benefits from financial stability now (ADU option) and inheritance later",
            `💛 At 65, combined guaranteed income: ${fmtC(derived.guaranteed65, true)}/yr`,
            "📋 Consider Roth conversions in low-income years (pre-65) to optimize Libby's inheritance tax efficiency",
            "🏦 SoonerSave accounts compound untouched during low-draw retirement phase",
          ].map((note, i) => (
            <div key={i} style={{ fontSize: 11, color: C.muted, marginBottom: 8,
              padding: "6px 10px", background: `${C.border}30`, borderRadius: 6 }}>
              {note}
            </div>
          ))}
        </Card>
      </div>
    );
  };

  // ─── TAB: INPUTS ──────────────────────────────────────────────────────────
  const InputsTab = () => (
    <div>
      <Card>
        <SectionLabel>Portfolio</SectionLabel>
        <Slider label="Current Portfolio" value={s.currentPort} min={800000} max={2000000} step={5000} onChange={set("currentPort")} />
        <Slider label="Monthly Contributions" value={s.monthlyContrib} min={0} max={15000} step={250} onChange={set("monthlyContrib")} />
        <Slider label="Annual Dividend Income" value={s.dividends} min={0} max={30000} step={500} onChange={set("dividends")} />
        <Toggle label="Dividends Active" value={s.dividendsOn} onChange={set("dividendsOn")} color={C.purple} />
      </Card>

      <Card>
        <SectionLabel>Spending & Inflation</SectionLabel>
        <Slider label="Inflation Rate" value={s.inflation} min={0.01} max={0.06} step={0.005}
          onChange={set("inflation")} display={v => `${(v*100).toFixed(1)}%`} color={C.orange}
          note="Applied to budget to project retirement-year costs. Affects all scenarios." />
        <Toggle label="Budget tab drives spending" value={s.budgetDrives} onChange={set("budgetDrives")} color={C.teal} />
        {s.budgetDrives ? (
          <div style={{ padding: "10px 12px", borderRadius: 10, background: `${C.teal}12`,
            border: `1px solid ${C.teal}30`, marginBottom: 12 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <div>
                <div style={{ fontSize: 9, color: C.dim, textTransform: "uppercase" }}>Today (2026)</div>
                <div style={{ fontSize: 14, fontWeight: 800, color: C.muted, fontFamily: "monospace" }}>{fmtC(budgetAnnual, true)}/yr</div>
              </div>
              <div>
                <div style={{ fontSize: 9, color: C.gold, textTransform: "uppercase" }}>At {curScenario.label}</div>
                <div style={{ fontSize: 14, fontWeight: 800, color: C.gold, fontFamily: "monospace" }}>{fmtC(budgetAtRetire, true)}/yr</div>
              </div>
            </div>
            <div style={{ fontSize: 10, color: C.teal, marginTop: 6 }}>
              Budget inflated {yearsToRetire}yr @ {(s.inflation*100).toFixed(1)}% — adjust in Budget tab or change scenario
            </div>
          </div>
        ) : (
          <Slider label="Annual Spending (manual, retirement-year $)" value={s.annualSpend} min={40000} max={200000} step={1000} onChange={set("annualSpend")} color={C.gold} />
        )}
        <Slider label="Side / Part-Time Income" value={s.sideIncome} min={0} max={60000} step={1000} onChange={set("sideIncome")} />
      </Card>

      <Card>
        <SectionLabel>Wife's Income</SectionLabel>
        <div style={{ fontSize: 10, color: C.muted, marginBottom: 8 }}>
          Use the Live Controls on the Home tab to toggle income scenarios. Set the base amount here.
        </div>
        <Slider label="Base Annual Amount (Full)" value={s.wifeIncome} min={0} max={100000} step={1000} onChange={set("wifeIncome")} />
      </Card>

      <Card>
        <SectionLabel>Retirement Income (Age 65)</SectionLabel>
        <Slider label="Social Security Annual" value={s.ssIncome} min={12000} max={48000} step={500} onChange={set("ssIncome")} />
        <Slider label="SS Start Age" value={s.ssAge} min={62} max={70} step={1} onChange={set("ssAge")} display={v => `${v}`} />
        <Slider label="TRS Start Age" value={s.trsAge} min={55} max={70} step={1} onChange={set("trsAge")} display={v => `${v}`} />
        <div style={{ padding: "8px 10px", borderRadius: 8, background: `${C.teal}12`,
          border: `1px solid ${C.teal}30`, fontSize: 11, color: C.muted, lineHeight: 1.7 }}>
          TRS is <strong style={{ color: C.teal }}>deferred, not reduced</strong> — you receive full benefit at {s.trsAge} regardless of when you retire. This is a critical distinction from early retirement reduction.
        </div>
      </Card>

      <Card>
        <SectionLabel>Scenario</SectionLabel>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: 5, marginBottom: 8 }}>
          {RETIRE_SCENARIOS.map(sc => (
            <button key={sc.id} onClick={() => set("selectedScenario")(sc.id)} style={{
              background: s.selectedScenario === sc.id ? `${sc.color}30` : "transparent",
              border: `1px solid ${s.selectedScenario === sc.id ? sc.color : C.dim}`,
              borderRadius: 8, padding: "7px 3px", cursor: "pointer", textAlign: "center",
            }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: s.selectedScenario === sc.id ? sc.color : C.muted }}>
                {sc.label.replace("Jun ", "'")}
              </div>
            </button>
          ))}
        </div>
      </Card>
    </div>
  );

  // ─── TABS CONFIG ──────────────────────────────────────────────────────────
  const TABS = [
    { id: "home",    icon: "🏠", label: "Home",      content: <HomeTab /> },
    { id: "retire",  icon: "📈", label: "Scenarios",  content: <RetireTab /> },
    { id: "budget",  icon: "💰", label: "Budget",    content: <BudgetTab /> },
    { id: "ozarks",  icon: "🏖️", label: "Ozarks",    content: <OzarksTab /> },
    { id: "legacy",  icon: "🏛️", label: "Legacy",    content: <LegacyTab /> },
    { id: "inputs",  icon: "⚙️", label: "Inputs",    content: <InputsTab /> },
  ];

  const activeTab = TABS.find(t => t.id === tab) || TABS[0];

  // ─── RENDER ───────────────────────────────────────────────────────────────
  return (
    <div style={{
      background: C.bg, minHeight: "100vh", color: C.text,
      fontFamily: "'Georgia', 'Times New Roman', serif",
      maxWidth: 480, margin: "0 auto", paddingBottom: 88,
    }}>
      {/* ── STICKY HEADER ── */}
      <div style={{
        background: "linear-gradient(160deg, #06111f 0%, #0d2d50 55%, #071828 100%)",
        padding: "16px 16px 12px",
        position: "sticky", top: 0, zIndex: 100,
        boxShadow: "0 4px 24px rgba(0,0,0,0.7)",
        borderBottom: `1px solid ${C.border}`,
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontSize: 21, fontWeight: 900, color: "white", fontStyle: "italic" }}>
              🌊 Flory Freedom
            </div>
            <div style={{ fontSize: 9, color: "rgba(255,255,255,0.45)", letterSpacing: 2, textTransform: "uppercase" }}>
              Financial Independence · Edmond, OK · v7
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 9, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: 1 }}>
              {curScenario.label} · {curScenario.trsYears}yr TRS
            </div>
            <div style={{ fontSize: 15, fontWeight: 800, color: curScenario.color, fontFamily: "monospace" }}>
              {fmtC(derived.projPort, true)}
            </div>
          </div>
        </div>

        {/* Headline */}
        <div style={{
          marginTop: 10, padding: "8px 12px", borderRadius: 9,
          background: `${headline.color}18`, border: `1px solid ${headline.color}45`,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 14, fontWeight: 800, color: headline.color }}>{headline.text}</div>
              <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)" }}>{headline.sub}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 9, color: "rgba(255,255,255,0.4)" }}>withdrawal rate</div>
              <div style={{ fontSize: 18, fontWeight: 900, fontFamily: "monospace",
                color: derived.preWR < 0.03 ? C.greenBright : derived.preWR < 0.04 ? C.gold : C.orange }}>
                {fmtPct(derived.preWR)}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ── TAB CONTENT ── */}
      <div style={{ padding: "14px 12px 0" }}>
        {activeTab.content}
      </div>

      {/* ── BOTTOM NAV ── */}
      <div style={{
        position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
        width: "100%", maxWidth: 480,
        background: "rgba(6,15,28,0.97)", backdropFilter: "blur(14px)",
        borderTop: `1px solid ${C.border}`,
        display: "flex", justifyContent: "space-around",
        padding: "8px 0 14px", zIndex: 200,
      }}>
        {TABS.map(({ id, icon, label }) => (
          <button key={id} onClick={() => setTab(id)} style={{
            background: "none", border: "none", cursor: "pointer",
            display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
          }}>
            <span style={{ fontSize: 20, filter: tab === id ? "none" : "grayscale(80%) opacity(0.45)" }}>{icon}</span>
            <span style={{ fontSize: 8, color: tab === id ? C.accent : C.dim,
              fontWeight: tab === id ? 700 : 400, letterSpacing: 0.5, textTransform: "uppercase" }}>
              {label}
            </span>
            {tab === id && <div style={{ width: 4, height: 3, borderRadius: 2, background: C.accent }} />}
          </button>
        ))}
      </div>
    </div>
  );
}
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FloryFreedomV7 />);
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>clients.claim());self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>new Response('Offline',{status:503})));}); `;
        const url=URL.createObjectURL(new Blob([sw],{type:'application/javascript'}));
        navigator.serviceWorker.register(url).catch(()=>{});
      });
    }
  </script>
</body>
</html>
