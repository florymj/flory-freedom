const fmtC = (n, compact = false) => {
if (n === undefined || isNaN(n)) return “$0”;
const abs = Math.abs(n);
if (compact && abs >= 1_000_000) return `$${(n / 1e6).toFixed(2)}M`;
if (compact && abs >= 1_000) return `$${(n / 1e3).toFixed(0)}k`;
return n.toLocaleString(“en-US”, {
style: “currency”,
currency: “USD”,
maximumFractionDigits: 0
});
};

// ─── PENSION-AWARE MONTE CARLO ───────────────────────────────────────────────
// Each year uses the ACTUAL withdrawal after all income sources are applied.
// Pre-trsAge: high gap. At trsAge: TRS cuts withdrawal sharply.
// At ssAge: SS adds on, gap often drops to near-zero. Portfolio then compounds.
function monteCarloStepped({
port,
retireAge,
trsAge,
ssAge,
years,
sims = 1200,
annualSpend,
wifeIncome,
dividends,
sideIncome,
condoCF,
trs,
ssIncome
}) {
if (port <= 0) return 0;
const mu = 0.069,
sigma = 0.155;
let ok = 0;
for (let sim = 0; sim < sims; sim++) {
let b = port,
alive = true;
for (let y = 0; y < years; y++) {
const age = retireAge + y;
const inf = Math.pow(1.03, y);
const guaranteed = wifeIncome * inf + dividends * inf + sideIncome * inf + condoCF * inf + (age >= trsAge ? trs * inf : 0) + (age >= ssAge ? ssIncome * inf : 0);
const withdrawal = Math.max(0, annualSpend * inf - guaranteed);
const u1 = Math.random(),
u2 = Math.random();
const z = Math.sqrt(-2 * Math.log(Math.max(u1, 1e-10))) * Math.cos(2 * Math.PI * u2);
b = b * (1 + mu + sigma * z) - withdrawal;
if (b <= 0) {
alive = false;
break;
}
}
if (alive) ok++;
}
return ok / sims;
}

// ─── TRS PENSION ──────────────────────────────────────────────────────────────
function calcTRS(years, highFiveSalary = 195000) {
return Math.round(0.023 * years * highFiveSalary);
}

// ─── PORTFOLIO GROWTH ─────────────────────────────────────────────────────────
function growPortfolio(current, monthlyContrib, months, annualReturn = 0.069) {
const r = annualReturn / 12;
let bal = current;
for (let m = 0; m < months; m++) bal = bal * (1 + r) + monthlyContrib;
return Math.round(bal);
}

// ─── SCENARIO ENGINE ──────────────────────────────────────────────────────────
function calcScenario(params) {
const {
currentPort,
monthlyContrib,
currentAge,
retireAge,
annualSpend,
wifeIncome,
dividends,
trsYears,
ssIncome,
trsAge,
ssAge,
condoCashFlow,
sideIncome
} = params;
const months = Math.round((retireAge - currentAge) * 12);
const projPort = growPortfolio(currentPort, monthlyContrib, months);
const trs = calcTRS(trsYears);

// Pre-65 income
const guaranteedPre = wifeIncome + dividends + sideIncome + condoCashFlow;
const preGap = Math.max(0, annualSpend - guaranteedPre);
const preWR = projPort > 0 ? preGap / projPort : 0;

// Age 65+ income
const guaranteed65 = dividends + trs + ssIncome;
const postGap = Math.max(0, annualSpend - guaranteed65);

// Monte Carlo
const mcArgs = {
port: projPort,
retireAge,
trsAge,
ssAge,
annualSpend,
wifeIncome,
dividends,
sideIncome,
condoCF: condoCashFlow,
trs,
ssIncome
};
const mc20 = monteCarloStepped({
…mcArgs,
years: 20
});
const mc30 = monteCarloStepped({
…mcArgs,
years: 30
});
const mc40 = monteCarloStepped({
…mcArgs,
years: 40
});
return {
projPort,
trs,
guaranteedPre,
preGap,
preWR,
guaranteed65,
postGap,
mc20,
mc30,
mc40
};
}
